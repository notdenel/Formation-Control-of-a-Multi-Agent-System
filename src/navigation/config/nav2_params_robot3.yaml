global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: robot3/base_footprint
      robot_radius: 0.22
      resolution: 0.05
      track_unknown_space: false
      rolling_window: false
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /robot3/scan_raw
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: True

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: robot3/odom
      robot_base_frame: robot3/base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.22
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /robot3/scan_raw
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: True

# ── AMCL ─────────────────────────────────────────────────────────────────────
# Mecanum-wheeled robot: must use OmniMotionModel, not the default differential
# model. Frame IDs, scan_topic, and tf_broadcast are also set by launch
# overrides in single_robot.launch.py (those overrides win); duplicated here
# so the file is self-describing.
amcl:
  ros__parameters:
    use_sim_time: false
    # Motion model — REQUIRED for mecanum / omnidirectional drive.
    robot_model_type: "nav2_amcl::OmniMotionModel"
    # Motion noise (alphas 1-4 = differential terms; alpha5 = omni lateral term).
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    # Frames — overridden by launch to namespaced versions.
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    global_frame_id: "map"
    # EKF (world_frame: map) owns the map→odom TF; AMCL must not publish it.
    tf_broadcast: false
    transform_tolerance: 0.5
    # Sensor — overridden by launch with the namespaced scan_topic.
    scan_topic: "scan_raw"
    map_topic: "map"
    laser_model_type: "likelihood_field"
    laser_min_range: 0.05
    laser_max_range: 12.0
    laser_likelihood_max_dist: 2.0
    max_beams: 60
    sigma_hit: 0.2
    z_hit: 0.5
    z_max: 0.05
    z_short: 0.05
    z_rand: 0.5
    lambda_short: 0.1
    # Update thresholds — mecanum can translate without rotating, so be
    # willing to update on small motion.
    update_min_d: 0.05
    update_min_a: 0.05
    resample_interval: 1
    # Particle filter.
    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1
    save_pose_rate: 0.5
    # Initial pose — set_initial_pose: true seeds AMCL on startup so it does
    # not deadlock waiting for /initialpose. Override per-robot below if the
    # robot starts somewhere other than the map origin (units: m, rad).
    set_initial_pose: true
    always_reset_initial_pose: false
    first_map_only: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9

# ── Map server ───────────────────────────────────────────────────────────────
# yaml_filename, topic_name, and frame_id are set by single_robot.launch.py
# overrides; included here for documentation and so map_server has a complete
# parameter set even when launched standalone.
map_server:
  ros__parameters:
    use_sim_time: false
    topic_name: "map"
    frame_id: "map"
