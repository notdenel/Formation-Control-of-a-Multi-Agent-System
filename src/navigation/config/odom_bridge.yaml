# odom_bridge.yaml — domain_bridge config for one robot.
#
# Template variables filled by odom_bridge.launch.py at launch time:
#   __ROBOT_NS__       — this robot's namespace, e.g. robot1
#   __PRIVATE_DOMAIN__ — this robot's private ROS_DOMAIN_ID (11 / 12 / 13)
#   __PEER1_NS__       — first peer namespace
#   __PEER2_NS__       — second peer namespace
#
# What crosses domains:
#   private → fleet (10):  /__ROBOT_NS__/odom        (Odometry)
#                          /__ROBOT_NS__/amcl_pose    (PoseWithCovarianceStamped)
#   fleet → private:       /__PEER1_NS__/odom         (Odometry)
#                          /__PEER2_NS__/odom         (Odometry)
#
# amcl_pose crosses so that the WSL coordinator's pose_aggregator can receive
# map-frame positions and so 'ros2 topic echo /robotX/amcl_pose' works on WSL.
#
# cmd_vel, initialpose, scan, TF etc. stay local to each robot's private domain.
# Aggregation runs ON each robot and publishes cmd_vel in the private domain —
# no reverse bridge needed, minimising WiFi traffic.
#
# To seed AMCL on a robot, SSH into it and publish /robotX/initialpose
# directly on its private domain.

name: odom_bridge
topics:
  /__ROBOT_NS__/odom:
    type: nav_msgs/msg/Odometry
    from_domain: __PRIVATE_DOMAIN__
    to_domain: 10

  /__ROBOT_NS__/amcl_pose:
    type: geometry_msgs/msg/PoseWithCovarianceStamped
    from_domain: __PRIVATE_DOMAIN__
    to_domain: 10

  /__PEER1_NS__/odom:
    type: nav_msgs/msg/Odometry
    from_domain: 10
    to_domain: __PRIVATE_DOMAIN__

  /__PEER2_NS__/odom:
    type: nav_msgs/msg/Odometry
    from_domain: 10
    to_domain: __PRIVATE_DOMAIN__
