/**:
  ros__parameters:
    update_frequency: 1.0
    publish_frequency: 1.0
    global_frame: map
    robot_base_frame: base_footprint
    robot_radius: 0.22
    resolution: 0.05
    track_unknown_space: false
    rolling_window: false
    plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
    static_layer:
      plugin: "nav2_costmap_2d::StaticLayer"
      map_subscribe_transient_local: True
    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      enabled: True
      observation_sources: scan
      scan:
        topic: /scan_raw
        max_obstacle_height: 2.0
        clearing: True
        marking: True
        data_type: "LaserScan"
        raytrace_max_range: 3.0
        raytrace_min_range: 0.0
        obstacle_max_range: 2.5
        obstacle_min_range: 0.0
    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      cost_scaling_factor: 3.0
      inflation_radius: 0.55
    always_send_full_costmap: True

/**:
  ros__parameters:
    update_frequency: 5.0
    publish_frequency: 2.0
    global_frame: robot1/odom   #ROBOT SPECIFIC
    robot_base_frame: base_footprint
    rolling_window: true
    width: 3
    height: 3
    resolution: 0.05
    robot_radius: 0.22
    plugins: ["voxel_layer", "inflation_layer"]
    voxel_layer:
      plugin: "nav2_costmap_2d::VoxelLayer"
      enabled: True
      publish_voxel_map: True
      origin_z: 0.0
      z_resolution: 0.05
      z_voxels: 16
      max_obstacle_height: 2.0
      mark_threshold: 0
      observation_sources: scan
      scan:
        topic: /scan_raw
        max_obstacle_height: 2.0
        clearing: True
        marking: True
        data_type: "LaserScan"
    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      cost_scaling_factor: 3.0
      inflation_radius: 0.55
    always_send_full_costmap: True

amcl:
  ros__parameters:
    # Laser model — cap range to match map dimensions (3.85m x 1.2m)
    laser_model_type: likelihood_field
    laser_max_range: 2.0
    laser_min_range: 0.15
    laser_max_beams: 60
    laser_likelihood_max_dist: 2.0

    # Particle filter — reduce counts for a small map
    min_particles: 200
    max_particles: 800

    # Update thresholds — smaller values for tight-space navigation
    update_min_d: 0.15
    update_min_a: 0.1
    resample_interval: 1

    # Odometry model — EKF fuses into a differential-drive-like odom output
    odom_model_type: diff
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    # Transform tolerance — 1.0 s default is too lenient; masks stale-TF bugs
    transform_tolerance: 0.3

    # Disable recovery relocalization; it destabilizes localization on tiny maps
    recovery_alpha_slow: 0.0
    recovery_alpha_fast: 0.0

    # Set initial pose — AMCL on a 3.85m x 1.2m map cannot self-localize
    # from a uniform particle cloud; it needs a starting estimate.
    set_initial_pose: true
    initial_pose:           #INITIAL POSE!!!!!!!
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
