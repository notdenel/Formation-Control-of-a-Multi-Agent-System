# nav2_params_robot1.yaml — Nav2 parameters for robot1.
#
# Frame IDs, scan_topic, yaml_filename, and tf_broadcast are further
# overridden by single_robot.launch.py; values here serve as documentation
# and self-contained defaults if the node were launched standalone.
#
# AMCL initial pose is set from this file so robots do NOT need an
# /initialpose message from RViz.  All robots are placed at the map origin
# (0, 0, yaw=0) before driving to their formation starting positions.

# ── Global costmap ────────────────────────────────────────────────────────────
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: robot1/base_footprint
      robot_radius: 0.22
      resolution: 0.05
      track_unknown_space: false
      rolling_window: false
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /robot1/scan_raw
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: True

# ── Local costmap ─────────────────────────────────────────────────────────────
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: robot1/odom
      robot_base_frame: robot1/base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.22
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /robot1/scan_raw
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: True

# ── AMCL ─────────────────────────────────────────────────────────────────────
# Frame IDs, scan_topic, and tf_broadcast are overridden by single_robot.launch.py.
# set_initial_pose: true seeds the particle filter at the origin on startup —
# no manual /initialpose message or RViz 2D Pose Estimate needed.
amcl:
  ros__parameters:
    use_sim_time: false
    robot_model_type: "nav2_amcl::OmniMotionModel"
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "robot1/base_footprint"
    odom_frame_id: "robot1/odom"
    global_frame_id: "map"
    # EKF 2 (ekf_map.yaml) owns the map→odom TF; AMCL must not publish it.
    tf_broadcast: false
    transform_tolerance: 0.5
    scan_topic: "scan_raw"
    map_topic: "map"
    laser_model_type: "likelihood_field"
    laser_min_range: 0.05
    laser_max_range: 12.0
    laser_likelihood_max_dist: 2.0
    max_beams: 60
    sigma_hit: 0.2
    z_hit: 0.5
    z_max: 0.05
    z_short: 0.05
    z_rand: 0.5
    lambda_short: 0.1
    update_min_d: 0.05
    update_min_a: 0.05
    resample_interval: 1
    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1
    save_pose_rate: 0.5
    # Seed the particle filter at the map origin on startup.
    # Robots are physically placed at origin before driving to formation.
    set_initial_pose: true
    always_reset_initial_pose: false
    first_map_only: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9

# ── Map server ───────────────────────────────────────────────────────────────
map_server:
  ros__parameters:
    use_sim_time: false
    topic_name: "map"
    frame_id: "map"
