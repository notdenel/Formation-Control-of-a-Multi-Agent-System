### ekf config for SLAM mapping ###
# world_frame: namespace/odom — EKF fuses wheel odom + rf2o yaw + IMU in the
# odom frame.  slam_toolbox owns the map→odom TF; running the EKF in
# world_frame: map here would create a conflicting second map→odom source.
# No pose0 (amcl_pose) — AMCL does not run during mapping.
/**:
    ros__parameters:
      use_sim_time: false
      frequency: 30.0
      sensor_timeout: 1.0
      two_d_mode: true
      transform_time_offset: 0.0
      transform_timeout: 0.2
      print_diagnostics: false
      debug: false
      debug_out_file: /path/to/debug/file.txt
      permit_corrected_publication: false
      publish_acceleration: false
      publish_tf: true

      map_frame: map
      odom_frame: namespace/odom
      base_link_frame: namespace/base_footprint
      world_frame: namespace/odom

      odom0: odom_raw
      odom0_config: [false, false, false,
                     false, false, false,
                     true, true, false,
                     false, false, true,
                     false, false, false]
      odom0_queue_size: 5
      odom0_differential: false
      odom0_relative: false
      odom0_pose_use_child_frame: false

      odom1: odom_rf2o
      odom1_config: [false, false, false,
                     false, false, true,
                     false, false, false,
                     false, false, false,
                     false, false, false]
      odom1_differential: false
      odom1_relative: true
      odom1_queue_size: 2

      imu0: imu
      imu0_config: [false, false, false,
                    false, false, false,
                    false, false, false,
                    false, false, true,
                    false, false, false]
      imu0_nodelay: false
      imu0_differential: false
      imu0_relative: true
      imu0_queue_size: 4
      imu0_remove_gravitational_acceleration: false

      use_control: false
      stamped_control: false
      control_timeout: 0.2
      control_config: [true, false, false, false, false, true]
      acceleration_limits: [1.3, 0.0, 0.0, 0.0, 0.0, 3.4]
