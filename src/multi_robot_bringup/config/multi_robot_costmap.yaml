# multi_robot_costmap.yaml
# ========================
# Global costmap that merges obstacle data from all three robots.
# Each robot runs its own instance; the shared /tf tree (map → robotX/odom →
# robotX/base_footprint → robotX/lidar_frame) lets the costmap correctly place
# every robot's scan in the global map frame.
#
# This file is loaded by real_robot.launch.py alongside the per-robot
# nav2_params_robotX.yaml. The robot_base_frame is overridden at launch time.
#
# To verify the merged costmap:
#   ros2 topic echo /robot1/global_costmap/costmap --once
#   rviz2 → Add → Map → Topic: /robot1/global_costmap/costmap

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false

      transform_tolerance: 2.0

      # Shared global frame — NEVER namespace this.
      global_frame: map

      # robot_base_frame is overridden at launch time to robotX/base_footprint.
      # This placeholder is safe; the launch file always overrides it.
      robot_base_frame: robot1/base_footprint


      update_frequency: 2.0
      publish_frequency: 1.0
      resolution: 0.05
      track_unknown_space: true
      always_send_full_costmap: true

      # Footprint in base_footprint frame (metres). Adjust to your robot size.
      robot_radius: 0.18

      plugins:
        - name: static_layer
          type: nav2_costmap_2d::StaticLayer
        - name: obstacle_layer
          type: nav2_costmap_2d::ObstacleLayer
        - name: inflation_layer
          type: nav2_costmap_2d::InflationLayer

      static_layer:
        enabled: true
        map_subscribe_transient_local: true
        # Relative topic → /robotX/map served by each robot's own map_server
        map_topic: map

      obstacle_layer:
        enabled: true
        # All three robots' scans — absolute paths so every robot's costmap
        # sees all obstacles regardless of which robot is running this node.
        # TF handles the coordinate transforms (map → robotX/lidar_frame).
        observation_sources: robot1_scan robot2_scan robot3_scan

        robot1_scan:
          topic: /robot1/scan
          sensor_frame: robot1/lidar_frame
          data_type: LaserScan
          marking: true
          clearing: true
          obstacle_max_range: 3.5
          obstacle_min_range: 0.0
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
          inf_is_valid: false

        robot2_scan:
          topic: /robot2/scan
          sensor_frame: robot2/lidar_frame
          data_type: LaserScan
          marking: true
          clearing: true
          obstacle_max_range: 3.5
          obstacle_min_range: 0.0
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
          inf_is_valid: false

        robot3_scan:
          topic: /robot3/scan
          sensor_frame: robot3/lidar_frame
          data_type: LaserScan
          marking: true
          clearing: true
          obstacle_max_range: 3.5
          obstacle_min_range: 0.0
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
          inf_is_valid: false

      inflation_layer:
        enabled: true
        inflation_radius: 0.35
        cost_scaling_factor: 3.0

# Lifecycle manager for the costmap node
lifecycle_manager_costmap:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names: ['global_costmap']
    bond_timeout: 4.0
