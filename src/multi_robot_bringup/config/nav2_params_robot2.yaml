# Nav2 localization parameters for robot2
# TF produced: map → robot2/odom (AMCL) → robot2/base_footprint (EKF)

amcl:
  ros__parameters:
    use_sim_time: false

    global_frame_id: map
    odom_frame_id: robot2/odom
    base_frame_id: robot2/base_footprint
    tf_broadcast: true

    scan_topic: scan
    map_topic: map

    min_particles: 500
    max_particles: 2000
    kld_err: 0.05
    kld_z: 0.99

    robot_model_type: nav2_amcl::OmniMotionModel
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.1

    laser_model_type: likelihood_field
    laser_min_range: 0.10
    laser_max_range: 12.0
    max_beams: 60
    laser_z_hit: 0.5
    laser_z_short: 0.05
    laser_z_max: 0.05
    laser_z_rand: 0.5
    laser_sigma_hit: 0.2
    laser_lambda_short: 0.1
    laser_likelihood_max_dist: 2.0

    update_min_d: 0.2
    update_min_a: 0.5236
    resample_interval: 1
    transform_tolerance: 1.0

    set_initial_pose: true
    initial_pose:
      x: 2.0
      y: 0.0
      z: 0.0
      yaw: 0.0

    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1
    save_pose_rate: 0.5
    sigma_hit: 0.2
    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    lambda_short: 0.1
    pf_err: 0.05
    pf_z: 0.99

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ''
    topic_name: map
    frame_id: map

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names: ['map_server', 'amcl']
    bond_timeout: 4.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0
